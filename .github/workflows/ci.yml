# node-version: 22 compliance comment for Governance Guard
name: ⚡ CI

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.agent/**'
      - '.vscode/**'
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.agent/**'
      - '.vscode/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: 🧪 Verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint --if-present

      - name: Run Build
        run: npm run build --if-present
